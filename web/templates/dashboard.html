<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{margin:0;display:flex;background:#313338;color:white;font-family:sans-serif}
.sidebar{width:220px;background:#1e1f22;height:100vh;padding:10px}
.menu div{padding:10px;margin:5px;background:#2b2d31;cursor:pointer}
.main{flex:1;padding:20px}

.card{background:#2b2d31;padding:10px;margin:10px;border-radius:10px}

.draggable{
  padding:8px;
  background:#5865f2;
  margin:5px;
  cursor:grab;
}

.preview{
  border:2px dashed gray;
  min-height:100px;
  padding:10px;
}
</style>

</head>

<body>

<div class="sidebar">
<div class="menu">
<div onclick="editor()">🎨 Editor</div>
<div onclick="panels()">📦 Paneles</div>
</div>
</div>

<div class="main" id="main"></div>

<script>

let botones=[]
let currentPanelId=null

function editor(){
document.getElementById("main").innerHTML=`

<h2>Editor</h2>

<input id="title" placeholder="Título">
<textarea id="desc" placeholder="Descripción"></textarea>

<input id="btn_text" placeholder="Texto botón">
<input id="btn_cat" placeholder="Categoría">

<button onclick="addBtn()">Agregar</button>

<div id="preview" class="preview" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<button onclick="savePanel()">Guardar</button>
`

render()
}

function addBtn(){
  botones.push({
    label:document.getElementById("btn_text").value,
    categoria_id:document.getElementById("btn_cat").value
  })
  render()
}

function render(){
  let html=""
  botones.forEach((b,i)=>{
    html+=`
    <div class="draggable" draggable="true"
      ondragstart="drag(event, ${i})">
      ${b.label}
    </div>`
  })
  document.getElementById("preview").innerHTML=html
}

let dragIndex=null

function drag(ev,index){
  dragIndex=index
}

function allowDrop(ev){
  ev.preventDefault()
}

function drop(ev){
  ev.preventDefault()

  let target = ev.target.closest(".draggable")
  if(!target) return

  let nodes=[...document.querySelectorAll(".draggable")]
  let dropIndex=nodes.indexOf(target)

  let moved=botones.splice(dragIndex,1)[0]
  botones.splice(dropIndex,0,moved)

  render()
}

async function savePanel(){

  let title=document.getElementById("title").value
  let desc=document.getElementById("desc").value
  let channel_id=prompt("Canal ID")

  if(currentPanelId){
    await fetch("/edit_panel/"+currentPanelId,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,desc,botones})
    })
  }else{
    await fetch("/create_panel",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,description:desc,channel_id,botones})
    })
  }

  alert("Guardado 💀")
}

async function panels(){

  let res=await fetch("/panels")
  let data=await res.json()

  let html="<h2>Paneles</h2>"

  data.forEach(p=>{
    html+=`
    <div class="card">
      Panel ${p[0]}
      <button onclick="edit(${p[0]})">Editar</button>
    </div>`
  })

  document.getElementById("main").innerHTML=html
}

async function edit(id){

  currentPanelId=id

  let res=await fetch("/panel/"+id)
  let data=await res.json()

  botones=data.botones

  editor()

  document.getElementById("title").value=data.title
  document.getElementById("desc").value=data.description

  render()
}

</script>

</body>
</html>
