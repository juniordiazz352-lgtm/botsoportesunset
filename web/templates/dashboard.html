<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0b0f1a;color:white;font-family:sans-serif}
#editor{display:flex;gap:20px}
#panel{background:#1f2937;padding:20px;width:300px;min-height:200px}
.btn{background:#6366f1;padding:10px;margin:5px;cursor:grab}
.toolbox{background:#111827;padding:10px;width:200px}
</style>
</head>

<body>

<h1>💀 Editor Visual</h1>

<div id="editor">

<div class="toolbox">
<h3>Elementos</h3>
<div class="btn" draggable="true" ondragstart="drag(event,'ticket')">🎫 Ticket</div>
<div class="btn" draggable="true" ondragstart="drag(event,'form')">📋 Formulario</div>
</div>

<div id="panel" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>Panel</h3>
</div>

</div>

<button onclick="guardar()">💾 Guardar</button>

<script>

let elementos=[]

function allowDrop(ev){ev.preventDefault()}

function drag(ev,tipo){
  ev.dataTransfer.setData("tipo",tipo)
}

function drop(ev){
  ev.preventDefault()

  let tipo=ev.dataTransfer.getData("tipo")

  let label=prompt("Nombre del botón")

  let obj={
    label:label,
    tipo:tipo
  }

  if(tipo=="ticket"){
    obj.categoria_id=parseInt(prompt("ID categoría"))
  }

  if(tipo=="form"){
    let title=prompt("Título del formulario")
    let preguntas=prompt("Preguntas separadas por coma").split(",")

    obj.form={
      title:title,
      questions:preguntas
    }
  }

  elementos.push(obj)

  render()
}

function render(){
  let html=""
  elementos.forEach((e,i)=>{
    html+=`
    <div class="btn">
      ${e.label} (${e.tipo})
      <button onclick="del(${i})">❌</button>
    </div>
    `
  })
  document.getElementById("panel").innerHTML=html
}

function del(i){
  elementos.splice(i,1)
  render()
}

async function guardar(){

  let data={
    channel_id:prompt("ID canal"),
    title:"Panel",
    description:"Sistema",
    botones:elementos
  }

  await fetch("/create_panel",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })

  alert("💀 Guardado")
}

</script>

</body>
</html>

<h2>📁 Transcripts</h2>
<div id="transcripts"></div>

<h2>📜 Logs</h2>
<div id="logs"></div>

<script>

async function loadTranscripts(){
  let res = await fetch("/transcripts")
  let data = await res.json()

  let html=""

  data.forEach(f=>{
    html += `<p><a href="/transcript/${f}" target="_blank">${f}</a></p>`
  })

  document.getElementById("transcripts").innerHTML = html
}

async function loadLogs(){
  let res = await fetch("/logs")
  let data = await res.json()

  let html=""

  data.forEach(l=>{
    html += `<p>${l[1]} - ${l[2]} - ${l[3]} - ${l[4]}</p>`
  })

  document.getElementById("logs").innerHTML = html
}

loadTranscripts()
loadLogs()

</script>
