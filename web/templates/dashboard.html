<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{display:flex;background:#0b0f1a;color:white;font-family:sans-serif}
.servers{width:200px;background:#020617;height:100vh;padding:10px}
.server{background:#1f2937;margin:5px;padding:10px;cursor:pointer}
.main{flex:1;padding:20px}
.card{background:#1f2937;padding:20px;border-radius:10px}
select,input{width:100%;margin:5px;padding:8px}
button{padding:10px;margin:5px;background:#6366f1;color:white;border:none}
</style>
</head>

<body>

<div class="servers" id="servers"></div>
<div class="main" id="main">
<h1>💀 Dashboard</h1>
<button onclick="login()">Login</button>
</div>

<script>

let guilds=[]
let botones=[]
let categories=[]

function login(){
  window.location.href="/login"
}

async function load(){
  let res = await fetch("/me")
  let data = await res.json()

  if(!data.user) return

  guilds = data.guilds.filter(g => (g.permissions & 0x8) === 0x8)

  renderGuilds()
}

function renderGuilds(){
  let html=""
  guilds.forEach(g=>{
    html += `<div class="server" onclick="selectGuild(${g.id})">${g.name}</div>`
  })
  document.getElementById("servers").innerHTML=html
}

async function selectGuild(id){

  let ch = await fetch("/channels/"+id)
  let channels = await ch.json()

  let cat = await fetch("/categories/"+id)
  categories = await cat.json()

  let optionsCh=""
  channels.forEach(c=>{
    optionsCh += `<option value="${c.id}">${c.name}</option>`
  })

  let optionsCat=""
  categories.forEach(c=>{
    optionsCat += `<option value="${c.id}">${c.name}</option>`
  })

  document.getElementById("main").innerHTML=`
  <div class="card">
    <h2>Crear Panel</h2>

    <select id="channel">${optionsCh}</select>
    <input id="title" placeholder="Título">
    <input id="desc" placeholder="Descripción">

    <select id="category">${optionsCat}</select>

    <div id="botones"></div>

    <button onclick="addBtn()">➕ Botón</button>
    <button onclick="crear()">🚀 Crear</button>
  </div>
  `
}

function addBtn(){
  let label=prompt("Nombre botón")

  let catSelect = document.getElementById("category").value

  botones.push({
    label:label,
    categoria_id:parseInt(catSelect),
    tipo:label.toLowerCase().replace(/ /g,"-")
  })

  alert("Botón añadido")
}

async function crear(){
  let data={
    channel_id:document.getElementById("channel").value,
    title:document.getElementById("title").value,
    description:document.getElementById("desc").value,
    botones:botones
  }

  await fetch("/create_panel",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })

  alert("💀 Panel creado")
}

load()
</script>

</body>
</html>

<h2>Paneles creados</h2>
<div id="paneles"></div>

<script>

async function cargarPaneles(){
  let res = await fetch("/panels")
  let data = await res.json()

  let html=""

  data.forEach(p=>{
    html += `
    <div class="card">
      <p>ID: ${p[0]}</p>
      <p>Channel: ${p[1]}</p>

      <button onclick="eliminar(${p[0]})">🗑 Eliminar</button>
      <button onclick="editar(${p[0]})">✏ Editar</button>
    </div>
    `
  })

  document.getElementById("paneles").innerHTML = html
}

async function eliminar(id){
  await fetch("/panel/"+id,{method:"DELETE"})
  alert("Eliminado")
  cargarPaneles()
}

async function editar(id){
  let nuevo = prompt("Nuevo nombre botón")

  let data = {
    botones:[
      {label:nuevo, categoria_id:123, tipo:"editado"}
    ]
  }

  await fetch("/panel/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })

  alert("Editado")
}

cargarPaneles()

</script>
