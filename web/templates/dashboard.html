<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
input{margin:5px;padding:5px}
button{margin:5px;padding:5px}
</style>
</head>

<body>

<h1>💀 Editor de Paneles</h1>

<div class="card">
<h2>Crear Panel</h2>

<input id="channel" placeholder="ID Canal"><br>
<input id="title" placeholder="Título"><br>
<input id="desc" placeholder="Descripción"><br>

<h3>Botones</h3>
<div id="botones"></div>

<button onclick="addBtn()">➕ Añadir botón</button>
<button onclick="crear()">🚀 Crear Panel</button>
</div>

<script>
let botones = []

function addBtn(){
    let label = prompt("Nombre botón")
    let cat = prompt("ID categoría")

    botones.push({
        label: label,
        categoria_id: parseInt(cat),
        tipo: label.toLowerCase().replace(/ /g,"-")
    })

    render()
}

function render(){
    let html=""
    botones.forEach(b=>{
        html+=`<div>${b.label} (${b.tipo})</div>`
    })
    document.getElementById("botones").innerHTML=html
}

async function crear(){
    let data={
        channel_id: document.getElementById("channel").value,
        title: document.getElementById("title").value,
        description: document.getElementById("desc").value,
        botones: botones
    }

    await fetch("/create_panel",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    })

    alert("Panel creado 💀")
}
</script>

</body>
</html>
