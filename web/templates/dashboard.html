<body>

<h1>💀 SaaS Panel</h1>
<button onclick="login()">Login</button>

<h2>🌐 Servidores</h2>
<div id="guilds"></div>

<script>

function login(){
  window.location.href="/login"
}

async function loadGuilds(){
  let res = await fetch("/guilds")
  let data = await res.json()

  let html=""

  data.forEach(g=>{
    html+=`
    <div>
      <b>${g[2]}</b>
      <button onclick="enter('${g[0]}')">Entrar</button>
    </div>
    `
  })

  document.getElementById("guilds").innerHTML=html
}

function enter(id){
  alert("Aquí cargarías paneles del server "+id)
}

loadGuilds()

</script>

</body>
