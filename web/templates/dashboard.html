<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
button{margin-top:5px;padding:5px}
</style>
</head>

<body>

<h1>💀 PANEL CONTROL TOTAL</h1>

<h2>🎫 Tickets</h2>
<div id="tickets"></div>

<h2>📋 Formularios</h2>
<div id="forms"></div>

<script>
async function load(){
 let res=await fetch("/data")
 let data=await res.json()

 let t=""
 for(let id in data.tickets){
   t+=`<div class="card">
   Ticket ${id} - ${data.tickets[id].status}
   <br><button onclick="closeT('${id}')">Cerrar</button>
   </div>`
 }
 document.getElementById("tickets").innerHTML=t

 let f=""
 data.responses?.forEach(x=>{
   f+=`<div class="card">
   Form ${x.id} - ${x.status}
   <br><button onclick="approve('${x.id}')">Aprobar</button>
   <button onclick="reject('${x.id}')">Rechazar</button>
   </div>`
 })
 document.getElementById("forms").innerHTML=f
}

async function closeT(id){
 await fetch(`/close_ticket/${id}`,{method:"POST"})
 load()
}

async function approve(id){
 await fetch(`/form/${id}/approved`,{method:"POST"})
 load()
}

async function reject(id){
 await fetch(`/form/${id}/rejected`,{method:"POST"})
 load()
}

load()
</script>

</body>
</html>
